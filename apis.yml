name: Nx
description: Nx is a smart, fast, extensible monorepo build system and integrated CI platform created and
  maintained by Nrwl. The Nx CLI (Rust core, TypeScript plugins) provides task orchestration, dependency-graph
  analysis, affected-only execution, local caching, and code generation across Angular, React, Next.js, Node,
  Vue, Vite, Webpack, Jest, Cypress, Playwright, Storybook, Gradle, .NET, Go, and dozens of other ecosystems.
  Nx Cloud extends the CLI with remote caching, distributed task execution via Nx Agents, atomized E2E test
  splitting, and AI-powered Self-Healing CI that detects, fixes, and retries failing pipelines. The Nx Console
  IDE extension and Nx MCP server make the workspace graph and generators consumable by editors and AI agents
  including Claude Code, Cursor, and Copilot. MIT licensed, with 28k+ GitHub stars, millions of monthly npm
  downloads, and adoption by 30% of the Fortune 500.
